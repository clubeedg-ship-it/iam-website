server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://tagmanager.google.com https://js.hsforms.net https://forms.hubspot.com https://js.hs-scripts.com https://js.hs-analytics.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data:; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://forms.hubspot.com https://static.ghost.org https://iam.zenithcred.com; frame-src https://www.googletagmanager.com https://forms.hubspot.com; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://forms.hubspot.com https://js.hsforms.net; media-src 'self'" always;

    # Clean product URLs
    location = /products/2in1       { rewrite ^ /products/2-in-1-vloer-muur.html last; }
    location = /products/vloer      { rewrite ^ /products/interactieve-vloer.html last; }
    location = /products/muur       { rewrite ^ /products/interactieve-muur.html last; }
    location = /products/zandbak    { rewrite ^ /products/interactieve-zandbak.html last; }
    location = /products/klimwand   { rewrite ^ /products/interactieve-klimwand.html last; }
    location = /products/mobiel     { rewrite ^ /products/mobiele-vloer.html last; }
    location = /products/software   { rewrite ^ /products/software-maatwerk.html last; }
    location = /products/tekeningen { rewrite ^ /products/interactieve-tekeningen.html last; }

    # Clean solution URLs
    location = /onderwijs           { rewrite ^ /onderwijs.html last; }
    location = /zorg                { rewrite ^ /zorg-revalidatie.html last; }
    location = /parken              { rewrite ^ /parken-speelhallen.html last; }
    location = /bouw-een-park       { rewrite ^ /bouw-een-park.html last; }
    location = /3d-spellen          { rewrite ^ /3d-spellen.html last; }
    location = /over-ons            { rewrite ^ /over-ons.html last; }
    location = /prijzen             { rewrite ^ /prijzen.html last; }
    location = /blog                { rewrite ^ /blog.html last; }
    location = /contact             { return 302 /#contact; }

    # Static site
    location / {
        try_files $uri $uri.html $uri/ =404;

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Ghost content images (uploaded via Ghost admin)
    location /content/images/ {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Ghost Content API (public, read-only)
    location /ghost/api/content/ {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        limit_req zone=ghost_api burst=20 nodelay;
    }

    # Ghost Admin (accessible at /admin/)
    location /ghost/ {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        limit_req zone=ghost_admin burst=20 nodelay;
    }

    # Admin shortcut redirect
    location = /admin {
        return 301 $scheme://$http_host/ghost/;
    }
    location = /admin/ {
        return 301 $scheme://$http_host/ghost/;
    }

    # Block config files
    location /api/chat {
        set $chat_backend "http://172.17.0.1:3860";
        proxy_pass $chat_backend/chat;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        resolver 127.0.0.11 valid=10s;
    }

    location ~ /\. { deny all; }
    location ~ ^/(docker|\.env|docker-compose) { deny all; }
    location /tools/ { deny all; }
    location /reference/ { deny all; }
}
