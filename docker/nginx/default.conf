server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://tagmanager.google.com https://js.hsforms.net https://forms.hubspot.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data:; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://forms.hubspot.com https://static.ghost.org; frame-src https://www.googletagmanager.com https://forms.hubspot.com; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://forms.hubspot.com https://js.hsforms.net; media-src 'self'" always;

    # Static site
    location / {
        try_files $uri $uri.html $uri/ =404;

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Ghost Content API (public, read-only)
    location /ghost/api/content/ {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=ghost_api burst=20 nodelay;
    }

    # Ghost Admin (accessible at /admin/)
    location /ghost/ {
        proxy_pass http://ghost:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        limit_req zone=ghost_admin burst=20 nodelay;
    }

    # Admin shortcut redirect
    location = /admin {
        return 301 $scheme://$http_host/ghost/;
    }
    location = /admin/ {
        return 301 $scheme://$http_host/ghost/;
    }

    # Block config files
    location ~ /\. { deny all; }
    location ~ ^/(docker|\.env|docker-compose) { deny all; }
    location /tools/ { deny all; }
    location /reference/ { deny all; }
}
